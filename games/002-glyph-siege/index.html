<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0b1e" />
  <title>Glyph Siege — GameCompany</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <canvas id="stage" width="720" height="960" aria-label="game canvas" role="img"></canvas>

    <div id="hud" aria-live="polite">
      <div id="hudLeft">
        <div id="timer" aria-label="time survived">00:00</div>
        <div id="kills" aria-label="kills">× 0</div>
      </div>
      <div id="hudRight">
        <div id="level" aria-label="level">Lv 1</div>
        <div id="hearts" aria-label="health"></div>
      </div>
      <div id="xpbar"><div id="xpfill"></div></div>
    </div>

    <div id="iconbar">
      <button id="muteBtn" class="iconbtn" aria-label="toggle sound" title="mute (M)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 L6 9 H3 v6 h3 l5 4 z"/><path d="M16 9 a4 4 0 0 1 0 6"/><path d="M19 6 a8 8 0 0 1 0 12"/></svg>
      </button>
      <button id="pauseBtn" class="iconbtn" aria-label="pause" title="pause (Esc)">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
      </button>
    </div>

    <div id="joypad" aria-label="virtual joystick" role="presentation">
      <div id="joyknob"></div>
    </div>
    <button id="bombBtn" class="bombbtn hidden" aria-label="detonate bomb" title="bomb (B)">
      <svg class="glyph" viewBox="0 0 24 24" aria-hidden="true">
        <defs>
          <radialGradient id="bb-glow" cx="50%" cy="55%" r="55%">
            <stop offset="0%" stop-color="#fff5d8" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#ff7a4c" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="bb-body" cx="38%" cy="32%" r="70%">
            <stop offset="0%" stop-color="#5a5f78"/>
            <stop offset="60%" stop-color="#1a1f3a"/>
            <stop offset="100%" stop-color="#04061a"/>
          </radialGradient>
        </defs>
        <circle cx="12" cy="14" r="11" fill="url(#bb-glow)"/>
        <circle cx="12" cy="14" r="7" fill="url(#bb-body)" stroke="#000" stroke-width="0.8"/>
        <ellipse cx="9.5" cy="11.5" rx="2" ry="1.4" fill="#ffffff" opacity="0.35"/>
        <rect x="10.5" y="5.5" width="3" height="2.4" rx="0.6" fill="#2a1a0e" stroke="#000" stroke-width="0.5"/>
        <path d="M12 5.5 Q14 3 13 1" fill="none" stroke="#8a6a3a" stroke-width="0.9" stroke-linecap="round"/>
        <circle cx="13" cy="1" r="1.4" fill="#ffd36d"/>
        <circle cx="13" cy="1" r="0.55" fill="#ffffff"/>
      </svg>
      <span class="count">0</span>
    </button>

    <div id="countdown" class="countdown hidden" aria-hidden="true"></div>

    <div id="overlay" class="overlay visible" role="dialog" aria-modal="true" aria-label="start menu">
      <h1 class="title">Glyph Siege</h1>
      <p class="hook">Hold the sanctuary. Move to survive. Stack runes.</p>
      <div class="controls">
        <div class="row"><span class="k">DRAG</span> steer on touch</div>
        <div class="row"><span class="k">W A S D</span> / arrows on keyboard</div>
        <div class="row"><span class="k">auto</span> attack nearest</div>
      </div>
      <button id="start" class="btn">Tap to start</button>
    </div>

    <div id="pauseOverlay" class="overlay hidden" role="dialog" aria-modal="true" aria-label="paused">
      <h2 class="title">Paused</h2>
      <p class="hook">Take a breath.</p>
      <button id="resumeBtn" class="btn">Resume</button>
    </div>

    <div id="upgradeOverlay" class="overlay hidden upgrade-overlay" role="dialog" aria-modal="true" aria-label="choose upgrade">
      <h2 class="title">Level Up</h2>
      <p class="hook">Choose one rune.</p>
      <div id="cards" class="cards"></div>
    </div>

    <div id="gameover" class="overlay hidden" role="dialog" aria-modal="true" aria-label="game over">
      <h2 class="title">Fallen</h2>
      <div class="stats">
        <div><span class="slabel">Time</span><span id="statTime">0s</span></div>
        <div><span class="slabel">Kills</span><span id="statKills">0</span></div>
        <div><span class="slabel">Level</span><span id="statLevel">1</span></div>
        <div><span class="slabel">Score</span><span id="finalScore">0</span></div>
      </div>
      <div id="bestBadge" class="best-badge hidden">NEW BEST</div>
      <button id="retry" class="btn">Retry</button>
    </div>

    <div id="bootError" class="overlay hidden" role="alertdialog" aria-modal="true" aria-label="error">
      <h2 class="title">Something broke</h2>
      <p class="hook" id="bootErrorMsg">Try resetting.</p>
      <button id="bootReset" class="btn">Reset &amp; reload</button>
    </div>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
