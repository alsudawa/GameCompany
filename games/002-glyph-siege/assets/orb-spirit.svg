<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="os-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#a5f0ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7cf6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="os-core" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#c4f8ff"/>
      <stop offset="80%" stop-color="#3da0b5"/>
      <stop offset="100%" stop-color="#0e3b45"/>
    </radialGradient>
  </defs>
  <!-- outer aura halo -->
  <circle cx="24" cy="24" r="22" fill="url(#os-aura)"/>
  <!-- runic ring (broken arcs suggesting a magic circle) -->
  <g fill="none" stroke="#a5f0ff" stroke-width="1.1" opacity="0.65">
    <path d="M24 7 a17 17 0 0 1 12 4.9"/>
    <path d="M41 24 a17 17 0 0 1 -4.9 12"/>
    <path d="M24 41 a17 17 0 0 1 -12 -4.9"/>
    <path d="M7 24 a17 17 0 0 1 4.9 -12"/>
  </g>
  <!-- 8 sigil dots around the ring -->
  <g fill="#e8faff">
    <circle cx="24" cy="6" r="1.4"/>
    <circle cx="36.7" cy="11.3" r="1.1"/>
    <circle cx="42" cy="24" r="1.4"/>
    <circle cx="36.7" cy="36.7" r="1.1"/>
    <circle cx="24" cy="42" r="1.4"/>
    <circle cx="11.3" cy="36.7" r="1.1"/>
    <circle cx="6" cy="24" r="1.4"/>
    <circle cx="11.3" cy="11.3" r="1.1"/>
  </g>
  <!-- inner core -->
  <circle cx="24" cy="24" r="11" fill="url(#os-core)" stroke="#0e3b45" stroke-width="1.2"/>
  <!-- 4-point compass star inside core -->
  <g stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.95">
    <line x1="24" y1="14.5" x2="24" y2="20"/>
    <line x1="24" y1="28" x2="24" y2="33.5"/>
    <line x1="14.5" y1="24" x2="20" y2="24"/>
    <line x1="28" y1="24" x2="33.5" y2="24"/>
  </g>
  <!-- bright pin in the center -->
  <circle cx="24" cy="24" r="2.4" fill="#ffffff"/>
  <!-- highlight bloom -->
  <ellipse cx="20" cy="19" rx="3.2" ry="2" fill="#ffffff" opacity="0.7"/>
</svg>
