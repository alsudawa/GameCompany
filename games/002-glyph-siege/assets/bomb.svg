<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bomb-glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#ffd36d" stop-opacity="0.75"/>
      <stop offset="60%" stop-color="#ff7a4c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff7a4c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bomb-body" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#5a5f78"/>
      <stop offset="55%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#04061a"/>
    </radialGradient>
    <linearGradient id="fuse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd36d"/>
      <stop offset="100%" stop-color="#ff5d73"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="28" r="22" fill="url(#bomb-glow)"/>
  <circle cx="24" cy="28" r="14" fill="url(#bomb-body)" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="19" cy="23" rx="4" ry="2.8" fill="#ffffff" opacity="0.3"/>
  <!-- fuse cap -->
  <rect x="21" y="10" width="6" height="5" rx="1.5" fill="#2a1a0e" stroke="#000" stroke-width="1"/>
  <!-- fuse wick -->
  <path d="M24 10 Q28 6 26 2" fill="none" stroke="#8a6a3a" stroke-width="1.6" stroke-linecap="round"/>
  <!-- fuse spark -->
  <circle cx="26" cy="2" r="2.4" fill="url(#fuse)"/>
  <circle cx="26" cy="2" r="1" fill="#ffffff"/>
  <!-- spark rays -->
  <g stroke="#fff4b0" stroke-width="0.8" stroke-linecap="round" opacity="0.85">
    <line x1="26" y1="-2" x2="26" y2="0"/>
    <line x1="30" y1="1" x2="28" y2="2"/>
    <line x1="24" y1="4" x2="23" y2="3"/>
  </g>
</svg>
