<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>void-pulse — GameCompany</title>
  <meta name="description" content="Tap the ring when the void pulses through it — a minimalist tap-timing casual game." />
  <meta name="theme-color" content="#0a0e1f" />
  <meta property="og:title" content="void-pulse" />
  <meta property="og:description" content="Tap the ring when the void pulses through it." />
  <meta property="og:type" content="website" />
  <link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%230a0e1f"/><circle cx="32" cy="32" r="20" fill="none" stroke="%2300d4ff" stroke-width="4"/><circle cx="32" cy="32" r="10" fill="none" stroke="%23ff3d6b" stroke-width="3" opacity=".85"/><circle cx="32" cy="32" r="3" fill="%2300d4ff"/></svg>' />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <canvas id="stage" width="720" height="960" aria-label="void-pulse canvas"></canvas>

    <div id="hud" aria-live="polite">
      <div id="score">0</div>
      <div id="comboWrap">
        <div id="combo"></div>
        <div id="comboMeter"><div id="comboMeterFill"></div></div>
      </div>
      <div id="lives"><span class="life">◯</span><span class="life">◯</span><span class="life">◯</span></div>
    </div>

    <div id="seedPill" class="seed-pill" hidden>DAILY · <span id="seedDate"></span></div>

    <button id="mute" class="icon-btn" type="button" aria-label="Toggle sound" title="Toggle sound">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path id="muteIconOn"  d="M4 9v6h4l5 4V5L8 9H4zm11.5 3a3.5 3.5 0 0 0-2-3.16v6.32A3.5 3.5 0 0 0 15.5 12zM14 3.23v2.06a6.98 6.98 0 0 1 0 13.42v2.06A9 9 0 0 0 14 3.23z" fill="currentColor"/>
        <path id="muteIconOff" d="M4 9v6h4l5 4V5L8 9H4zm12.59 3 2.7-2.7-1.42-1.42-2.7 2.7-2.7-2.7-1.41 1.42 2.7 2.7-2.7 2.7 1.41 1.42 2.7-2.7 2.7 2.7 1.42-1.42-2.7-2.7z" fill="currentColor" style="display:none"/>
      </svg>
    </button>

    <div id="overlay" class="overlay visible">
      <h1 class="title">void-pulse</h1>
      <p id="startSubtitle" class="seed-subtitle" hidden>Daily · <span id="seedDateStart"></span></p>
      <p class="hook">Tap the ring when the void pulses through it.</p>
      <button id="start" class="btn">Tap to start</button>
      <p class="kbhint">or press <kbd>Space</kbd></p>
      <a id="dailyLink" class="daily-link" href="?daily=1" hidden>Try today's daily →</a>
      <a id="freeLink"  class="daily-link" href="./" hidden>← Back to free play</a>
    </div>

    <div id="gameover" class="overlay hidden">
      <div id="newBest" class="new-best">NEW BEST</div>
      <h2 class="title">void silenced</h2>
      <p class="final-score">Score: <span id="finalScore">0</span></p>
      <p class="best-score">Best: <span id="bestScore">0</span></p>
      <div id="stats" class="stats">
        <div><span>Peak combo</span><span id="statPeak">0</span></div>
        <div><span>Perfects</span><span id="statPerfect">0</span></div>
        <div><span>Hits</span><span id="statHits">0</span></div>
      </div>
      <div id="history" class="history" aria-label="Last runs">
        <span id="historyLabel" class="history-label">Last runs</span>
        <svg id="historySvg" viewBox="0 0 120 28" width="120" height="28" aria-hidden="true"></svg>
      </div>
      <p id="tomorrow" class="tomorrow" hidden>Next daily in <span id="tomorrowTime">—</span></p>
      <button id="share" class="share-btn" type="button" aria-label="Share score" hidden>
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81a3 3 0 1 0-3-3c0 .24.04.47.09.7L8.04 9.81A3 3 0 0 0 6 9a3 3 0 1 0 0 6c.79 0 1.5-.31 2.04-.81l7.12 4.15c-.05.21-.08.43-.08.66a2.92 2.92 0 1 0 2.92-2.92z" fill="currentColor"/></svg>
        <span>Share</span>
      </button>
      <p class="retry-hint">Tap to retry</p>
    </div>

    <div id="pause" class="overlay hidden" aria-hidden="true">
      <div class="pause-ring">
        <div id="pauseCountdown" class="pause-countdown">paused</div>
      </div>
      <p class="pause-hint">Return to the tab to resume</p>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
